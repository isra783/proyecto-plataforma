<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">¿Estás seguro de eliminar esta reserva?</h3>
            </div>
            <div class="card-body">
                <p>Estás a punto de eliminar la reserva del cliente <strong>{{ reserva.cliente }}</strong> para la <strong>Habitación {{ reserva.habitacion.numero }}</strong>.</p>
                <p class="text-danger fw-bold">Esta acción no se puede deshacer.</p>

                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Sí, Eliminar Definitivamente</button>
                    <a href="{% url 'inicio' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
