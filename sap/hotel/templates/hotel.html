<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modelos de Habitación - Cotopaxi Inn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4 text-center text-primary">
        {{ tipo_seleccionado }}
    </h1>

    <div class="mb-3">
        <a href="{% url 'inicio' %}" class="btn btn-secondary">&larr; Volver al Inicio</a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Número</th>
                        <th>Tipo</th>
                        <th>Capacidad</th>
                        <th>Precio</th>
                    </tr>
                </thead>
                <tbody>
                    {% for x in hotel %}
                    <tr>
                        <td class="fw-bold">{{ x.numero }}</td>
                        <td>{{ x.get_tipo_display }}</td>
                        <td>{{ x.capacidad }} personas</td>
                        <td>${{ x.precio }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center py-4 text-muted">
                            No hay habitaciones registradas con estas características.
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
